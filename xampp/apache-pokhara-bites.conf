# Optional XAMPP Apache reverse proxy.
# Use this only if you want Apache to serve the public URL while Tomcat runs the JSP app.
#
# 1. Make sure these Apache modules are enabled in XAMPP's httpd.conf:
#    LoadModule proxy_module modules/mod_proxy.so
#    LoadModule proxy_http_module modules/mod_proxy_http.so
# 2. Include this file from /Applications/XAMPP/xamppfiles/etc/httpd.conf.
# 3. Start XAMPP Apache and XAMPP Tomcat.
#
# Then open: http://localhost/pokhara-bites/

ProxyPreserveHost On
ProxyPass /pokhara-bites/ http://localhost:8080/pokhara-bites/
ProxyPassReverse /pokhara-bites/ http://localhost:8080/pokhara-bites/
